<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lab #4 - Bootstrap Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-light bg-white border-bottom shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 px-3">Navbar</span>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="row g-4">
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100">
                    <img src="https://placehold.co/600x400?text=Hello\nWorld" class="card-img-top" alt="Placeholder">
                    <div class="card-body">
                        <p class="card-text">Number 1</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100">
                    <img src="https://placehold.co/600x400?text=Hello\nWorld" class="card-img-top" alt="Placeholder">
                    <div class="card-body test-right">
                        <p class="card-text">Number 2</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100">
                    <img src="https://placehold.co/600x400/orange/white" class="card-img-top" alt="Placeholder">
                    <div class="card-body text-center">
                        <p class="card-text">Number 3</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100">
                    <img src="https://placehold.co/600x400/000000/FFF" class="card-img-top" alt="Placeholder">
                    <div class="card-body text-left">
                        <p class="card-text"> Number 4</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100">
                    <img src="https://placehold.co/600x400?text=Hello+World" class="card-img-top" alt="Placeholder">
                    <div class="card-body">
                        <p class="card-text">hello number <em>5</em></p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100">
                    <img src="https://placehold.co/600x400/000000/FFFFFF/png" class="card-img-top" alt="Placeholder">
                    <div class="card-body">
                        <p class="card-text">I am <strong>Number 6</strong></p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100">
                    <img src="https://placehold.co/600x400?text=Image+cap" class="card-img-top" alt="Placeholder">
                    <div class="card-body">
                        <p class="card-text">Some quick example text to build on the card title and make up the bulk of
                            the card's content.</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100">
                    <img src="https://placehold.co/600x400/000000/FFF" class="card-img-top" alt="Placeholder">
                    <div class="card-body">
                        <p class="card-text">Some quick example text to build on the card title and make up the bulk of
                            the card's content.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
