<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Lab - Costant's Portfolio</title>
    <link href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">The Marketplace</h1>
            <p class="lead">Buy More Save More!!</p>
        </header>

        <div class="row mb-4 justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="input-group shadow-sm">
                    <label class="input-group-text bg-primary text-white" for="category-filter">Category</label>
                    <select id="category-filter" class="form-select">
                        <option value="all">Show All Products</option>
                        </select>
                </div>
            </div>
        </div>

        <div id="product-list" class="row g-4">
            </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
